<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon GO 100% IV</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#1e1e1e;
    color:white;
    text-align:center;
    padding:20px;
}

h2{
    color:#00ffcc;
}

input{
    width:80%;
    padding:12px;
    font-size:16px;
    border-radius:8px;
    border:none;
    margin-bottom:10px;
}

button{
    padding:12px 20px;
    font-size:16px;
    border-radius:8px;
    border:none;
    background:#00ffcc;
    cursor:pointer;
}

#result{
    margin-top:20px;
    font-size:18px;
}
</style>
</head>

<body>

<h2>Pokémon GO 100% IV Calculator</h2>

<input list="pokemonList" id="pokemonName" placeholder="Escribe un Pokémon">
<datalist id="pokemonList"></datalist>

<br>
<button onclick="buscarPokemon()">Calcular</button>

<div id="result"></div>

<script>

// CP Multipliers oficiales
const CP_MULTIPLIERS = {
    20: 0.59740001,
    25: 0.667934,
    30: 0.7317,
    35: 0.79030001
};

// Cargar TODOS los Pokémon automáticamente
async function cargarLista(){
    const res = await fetch("https://pokeapi.co/api/v2/pokemon?limit=2000");
    const data = await res.json();
    const list = document.getElementById("pokemonList");

    data.results.forEach(pokemon=>{
        let option = document.createElement("option");
        option.value = pokemon.name;
        list.appendChild(option);
    });
}

cargarLista();

function calcularCP(attack, defense, stamina, level){
    let cpm = CP_MULTIPLIERS[level];
    return Math.floor((attack * Math.sqrt(defense) * Math.sqrt(stamina) * Math.pow(cpm,2)) / 10);
}

async function buscarPokemon(){
    const name = document.getElementById("pokemonName").value.toLowerCase();
    const result = document.getElementById("result");
    result.innerHTML = "Calculando...";

    try{
        const response = await fetch("https://pokeapi.co/api/v2/pokemon/" + name);
        if(!response.ok) throw new Error();

        const data = await response.json();

        let stats = {};
        data.stats.forEach(stat=>{
            stats[stat.stat.name] = stat.base_stat;
        });

        let attack = stats["attack"] + 15;
        let defense = stats["defense"] + 15;
        let stamina = stats["hp"] + 15;

        let cp20 = calcularCP(attack, defense, stamina, 20);
        let cp25 = calcularCP(attack, defense, stamina, 25);
        let cp30 = calcularCP(attack, defense, stamina, 30);
        let cp35 = calcularCP(attack, defense, stamina, 35);

        result.innerHTML = `
        <h3>${name.toUpperCase()} 100% IV</h3>
        ⚔️ Incursión (Nivel 20): <b>${cp20} PC</b><br>
        🌧️ Incursión con clima (Nivel 25): <b>${cp25} PC</b><br><br>
        🌿 Salvaje (Nivel 30): <b>${cp30} PC</b><br>
        ☀️ Salvaje con clima (Nivel 35): <b>${cp35} PC</b>
        `;

    }catch{
        result.innerHTML = "❌ Pokémon no encontrado";
    }
}

</script>

</body>
</html>
